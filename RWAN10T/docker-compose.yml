services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver

    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "@Admin123"

    ports:
      - "1433:1433"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P @Admin123 -Q 'SELECT 1' -C || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: RWAN10T.Api/Dockerfile

    container_name: rwan10t.api

    depends_on:
      sqlserver:
        condition: service_healthy

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ASPNETCORE_URLS: http://+:8080;https://+:8443

      ASPNETCORE_Kestrel__Certificates__Default__Path: /https/RWAN10T.Api.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: senha123

      MSSQLServerConnection__MSSQLServerConnectionString: >
        Server=sqlserver,1433;
        Database=RWAN10T;
        User Id=sa;
        Password=@Admin123;
        TrustServerCertificate=True;

    ports:
      - "8080:8080"
      - "8443:8443"

    volumes:
      - ${APPDATA}/ASP.NET/Https:/https:ro

networks:
  default:
    name: rwan10t-network